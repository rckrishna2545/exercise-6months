<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Iron Regiment — 6-Month Dumbbell Program</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f4f0; --card:#fff; --surface:#f0ede8; --surface2:#e8e4dc;
  --text:#1a1a18; --text2:#6b6860; --text3:#9b9890;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16);
  --red:#c8382d; --red2:#e8534a; --red-bg:#fce8e8; --red-t:#a32d2d;
  --green:#4a8c1c; --green-bg:#eaf3de; --green-t:#3b6d11;
  --blue:#185fa5; --blue-bg:#e6f1fb; --blue-t:#185fa5;
  --amber:#854f0b; --amber-bg:#faeeda; --amber-t:#854f0b;
  --teal:#1d9e75; --teal-bg:#e1f5ee; --teal-t:#0f6e56;
  --steel:#2c3e50; --r:8px; --rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181816; --card:#222220; --surface:#2a2a28; --surface2:#323230;
  --text:#e8e4dc; --text2:#9b9890; --text3:#6b6860;
  --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.16);
  --red-bg:#3a1210; --red-t:#f09595;
  --green-bg:#1a2e0a; --green-t:#c0dd97;
  --blue-bg:#0c2540; --blue-t:#85b7eb;
  --amber-bg:#2e1c04; --amber-t:#fac775;
  --teal-bg:#042c20; --teal-t:#9fe1cb;
  --steel:#1a2533;
}}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--card);}
@media(min-width:500px){#app{margin:1rem auto;min-height:calc(100vh - 2rem);border-radius:var(--rl);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);}}

/* HEADER */
.hdr{background:var(--steel);color:#e8e0d4;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
.hdr-sub{font-size:11px;color:#9fb3c8;margin-top:1px;}
.badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r);letter-spacing:.5px;}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:500;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--text);border-bottom-color:var(--red);}
.pane{display:none;padding:1rem 1.1rem;flex:1;overflow-y:auto;}
.pane.active{display:block;}

/* TYPOGRAPHY UTILS */
.sec{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.divider{height:1px;background:var(--border);margin:1rem 0;}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
.tag-red{background:var(--red-bg);color:var(--red-t);}
.tag-blue{background:var(--blue-bg);color:var(--blue-t);}
.tag-green{background:var(--green-bg);color:var(--green-t);}
.tag-amber{background:var(--amber-bg);color:var(--amber-t);}
.tag-teal{background:var(--teal-bg);color:var(--teal-t);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem;}
.stat-card{background:var(--surface);border-radius:var(--r);padding:9px 6px;text-align:center;}
.stat-v{font-size:20px;font-weight:700;}
.stat-l{font-size:10px;color:var(--text2);margin-top:1px;}

/* PHASE GRID */
.phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1rem;}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px;cursor:pointer;transition:border-color .15s;}
.ph-card.cur{border:2px solid var(--red);}
.ph-num{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ph-name{font-size:12px;font-weight:700;color:var(--text);margin-top:2px;}
.ph-wks{font-size:11px;color:var(--text2);}
.ph-bar{height:3px;border-radius:2px;margin-top:7px;background:var(--border);}
.ph-fill{height:100%;border-radius:2px;background:var(--red);transition:width .4s;}

/* DAY CARDS */
.days-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.day-card:hover{border-color:var(--border2);}
.day-card.done{border-color:var(--green);}
.day-card.inprogress{border-color:var(--amber);border-width:2px;}
.day-top{display:flex;justify-content:space-between;align-items:flex-start;}
.day-lbl{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.day-name{font-size:13px;font-weight:700;color:var(--text);margin-top:2px;}
.day-focus{font-size:11px;color:var(--text2);margin-top:2px;}
.day-meta{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.date-badge{font-size:10px;color:var(--green);margin-top:3px;}
.ci{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.ci-done{background:var(--green);color:#fff;}
.ci-ip{background:var(--amber);color:#fff;}
.ci-none{background:var(--border);}
.week-sel{margin-bottom:.75rem;}
.week-sel select{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card);color:var(--text);}

/* ═══ SESSION RUNNER ═══════════════════════════════════════════════════════ */
.runner{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden;}
@media(min-width:500px){.runner{inset:1rem auto;max-height:calc(100vh - 2rem);border-radius:var(--rl);box-shadow:0 4px 32px rgba(0,0,0,.18);}}
.runner-hdr{background:var(--steel);color:#e8e0d4;padding:.85rem 1.1rem;display:flex;align-items:center;gap:10px;}
.runner-back{background:none;border:none;color:#9fb3c8;cursor:pointer;font-size:20px;line-height:1;padding:0 4px 0 0;}
.runner-title{flex:1;}
.runner-title h2{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.runner-title p{font-size:11px;color:#9fb3c8;margin-top:1px;}

/* progress bar at top */
.runner-progress-bar{height:4px;background:rgba(255,255,255,.15);}
.runner-progress-fill{height:100%;background:var(--teal);transition:width .4s;}

/* exercise area */
.runner-body{flex:1;overflow-y:auto;padding:1rem 1.1rem;}

/* animated exercise illustration */
.ex-anim-wrap{background:var(--surface);border-radius:var(--rl);margin-bottom:1rem;overflow:hidden;position:relative;}
.ex-anim-canvas{display:block;width:100%;height:180px;}
.ex-anim-label{position:absolute;bottom:8px;right:10px;font-size:10px;color:var(--text3);}

/* exercise info */
.ex-headline{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.ex-muscles{font-size:13px;color:var(--text2);margin-bottom:.75rem;}
.ex-tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}

/* set tracker */
.sets-track{background:var(--surface);border-radius:var(--r);padding:10px 12px;margin-bottom:1rem;}
.sets-track-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.sets-track-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.sets-track-count{font-size:22px;font-weight:700;color:var(--text);}
.sets-dots{display:flex;gap:6px;flex-wrap:wrap;}
.set-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.set-dot.done{background:var(--green);border-color:var(--green);color:#fff;}
.set-dot.active{border-color:var(--red);color:var(--red);transform:scale(1.1);}

/* rest timer */
.rest-timer{background:var(--amber-bg);border:1px solid var(--amber-t);border-radius:var(--rl);padding:1rem;margin-bottom:1rem;text-align:center;}
.rest-timer h3{font-size:13px;font-weight:700;color:var(--amber-t);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.rest-countdown{font-size:48px;font-weight:700;color:var(--amber-t);font-variant-numeric:tabular-nums;line-height:1;}
.rest-sub{font-size:12px;color:var(--amber-t);opacity:.7;margin-top:4px;}
.rest-skip{background:none;border:1px solid var(--amber-t);color:var(--amber-t);border-radius:var(--r);padding:6px 16px;font-size:13px;cursor:pointer;margin-top:8px;}

/* benefit box */
.benefit-box{background:var(--teal-bg);border:1px solid var(--teal-t);border-radius:var(--r);padding:10px 12px;margin-bottom:1rem;}
.benefit-box h4{font-size:11px;font-weight:700;color:var(--teal-t);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.benefit-box p{font-size:12px;color:var(--teal-t);line-height:1.6;}

/* form cue */
.form-box{background:var(--blue-bg);border:1px solid var(--blue-t);border-radius:var(--r);padding:10px 12px;margin-bottom:1rem;}
.form-box h4{font-size:11px;font-weight:700;color:var(--blue-t);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.form-box p{font-size:12px;color:var(--blue-t);line-height:1.6;}

/* nav row */
.runner-nav{display:flex;gap:8px;padding:.85rem 1.1rem;background:var(--card);border-top:1px solid var(--border);}
.btn{flex:1;padding:13px 8px;border:none;border-radius:var(--rl);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px;}
.btn-prev{background:var(--surface);color:var(--text2);}
.btn-prev:hover{background:var(--surface2);}
.btn-pause{background:var(--amber-bg);color:var(--amber-t);border:1px solid var(--amber-t);}
.btn-next{background:var(--red);color:#fff;}
.btn-next:hover{background:var(--red2);}
.btn-finish{background:var(--green);color:#fff;}
.btn-full{background:var(--red);color:#fff;flex:1;}

/* paused overlay */
.paused-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;}
.paused-overlay h2{color:#fff;font-size:24px;font-weight:700;}
.paused-overlay p{color:rgba(255,255,255,.7);font-size:14px;}
.btn-resume{background:var(--green);color:#fff;border:none;border-radius:var(--rl);padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;}
.btn-quit{background:none;border:1px solid rgba(255,255,255,.4);color:rgba(255,255,255,.7);border-radius:var(--rl);padding:10px 24px;font-size:14px;cursor:pointer;}

/* complete screen */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;flex:1;}
.complete-icon{font-size:56px;margin-bottom:1rem;}
.complete-screen h2{font-size:24px;font-weight:700;color:var(--text);margin-bottom:.5rem;}
.complete-screen p{font-size:15px;color:var(--text2);margin-bottom:1.5rem;}
.complete-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;margin-bottom:1.5rem;}
.cs-card{background:var(--surface);border-radius:var(--r);padding:12px 8px;text-align:center;}
.cs-v{font-size:22px;font-weight:700;color:var(--text);}
.cs-l{font-size:11px;color:var(--text2);}

/* BENEFITS PAGE */
.benefit-section{margin-bottom:1.25rem;}
.benefit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px;}
.benefit-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.benefit-card p{font-size:13px;color:var(--text2);line-height:1.65;}
.benefit-icon{font-size:20px;margin-bottom:6px;}

/* PROGRESS */
.big-prog{background:var(--surface);border-radius:var(--rl);padding:1rem 1.1rem;margin-bottom:1rem;}
.bp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.bp-lbl{font-size:13px;color:var(--text2);}
.bp-val{font-size:24px;font-weight:700;color:var(--text);}
.pbar{height:8px;border-radius:4px;background:var(--border);}
.pfill{height:100%;border-radius:4px;background:var(--red);transition:width .5s;}
.pfill-g{background:var(--green);}
.log-entry{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--card);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:6px;}
.log-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.log-name{font-size:13px;font-weight:600;color:var(--text);}
.log-sub{font-size:11px;color:var(--text2);}
.log-date{font-size:11px;color:var(--text2);white-space:nowrap;}
.wk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem;}
.wk-cell{background:var(--surface);border-radius:var(--r);padding:8px;text-align:center;}
.wk-v{font-size:19px;font-weight:700;}
.wk-l{font-size:10px;color:var(--text2);margin-top:1px;}
.cal-hdr,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-hdr{margin-bottom:4px;}
.cal-lbl{font-size:10px;color:var(--text2);text-align:center;}
.cal-cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.cal-workout{background:var(--surface);cursor:pointer;color:var(--text2);}
.cal-done{background:var(--green-bg);color:var(--green-t);}
.cal-rest{color:var(--border2);}

/* SCHEDULE */
.sched-row{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--card);border:1px solid var(--border);border-radius:var(--rl);cursor:pointer;margin-bottom:4px;}
.sched-row:hover{border-color:var(--border2);}
.sched-wk{font-size:13px;font-weight:700;min-width:58px;color:var(--text);}
.sched-info{flex:1;font-size:12px;color:var(--text2);}
.sched-bar{width:40px;height:4px;border-radius:2px;background:var(--border);}
.sched-fill{height:100%;border-radius:2px;}
.empty{font-size:13px;color:var(--text2);}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem;}
.back-btn:hover{color:var(--text);}
.meta-row{display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap;}
.mpill{display:flex;align-items:center;gap:4px;background:var(--surface);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--text2);}
.mpill span{color:var(--text);font-weight:700;}
.start-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:8px;}
.start-card h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.start-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;}
.ex-list-preview{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.ex-prev-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-radius:var(--r);}
.ex-prev-num{width:22px;height:22px;border-radius:50%;background:var(--red-bg);color:var(--red-t);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-prev-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.ex-prev-muscle{font-size:11px;color:var(--text2);}
.btn-start-session{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:var(--rl);font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.btn-start-session:hover{background:var(--red2);}
.btn-continue{width:100%;padding:14px;background:var(--amber);color:#fff;border:none;border-radius:var(--rl);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;margin-bottom:8px;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><div class="hdr-title">⚔ Iron Regiment</div><div class="hdr-sub">6-Month Dumbbell Military Program</div></div>
    <div class="badge" id="hdr-phase">Phase 1</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',event)">Overview</button>
    <button class="tab" onclick="switchTab('train',event)">Train</button>
    <button class="tab" onclick="switchTab('progress',event)">Progress</button>
    <button class="tab" onclick="switchTab('schedule',event)">Schedule</button>
    <button class="tab" onclick="switchTab('benefits',event)">Benefits</button>
  </div>
  <div id="pane-overview" class="pane active"></div>
  <div id="pane-train" class="pane"></div>
  <div id="pane-progress" class="pane"></div>
  <div id="pane-schedule" class="pane"></div>
  <div id="pane-benefits" class="pane"></div>
</div>

<!-- SESSION RUNNER (hidden by default) -->
<div class="runner" id="runner" style="display:none;"></div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const PHASES=[
  {name:"Foundation",  weeks:"1–4",  focus:"Form mastery & base strength",  wRange:[1,4]},
  {name:"Strength",    weeks:"5–8",  focus:"Heavy compound dumbbell lifts",  wRange:[5,8]},
  {name:"Hypertrophy", weeks:"9–13", focus:"Volume & muscle growth",         wRange:[9,13]},
  {name:"Power",       weeks:"14–18",focus:"Explosiveness & speed",          wRange:[14,18]},
  {name:"Cut & Define",weeks:"19–22",focus:"Definition & muscular endurance",wRange:[19,22]},
  {name:"Peak",        weeks:"23–26",focus:"Max performance & strength peak", wRange:[23,26]},
];
const PP=[
  {sets:3,reps:"10-12",rest:90, dur:"25 min",level:"Moderate"},
  {sets:4,reps:"6-8",  rest:120,dur:"28 min",level:"Heavy"},
  {sets:4,reps:"10-12",rest:60, dur:"30 min",level:"High Vol."},
  {sets:5,reps:"5-6",  rest:150,dur:"30 min",level:"Power"},
  {sets:3,reps:"15-20",rest:30, dur:"22 min",level:"Endurance"},
  {sets:5,reps:"8-10", rest:90, dur:"30 min",level:"Peak"},
];
const WDAYS=["Monday","Tuesday","Thursday","Friday"];
const DT=["A","B","C","D"];

// ─── ANIMATED SVG FRAMES for each exercise ────────────────────────────────
// Each exercise has a multi-frame SVG animation showing the movement arc
// ─── STICK FIGURE ANIMATIONS ───────────────────────────────────────────────
// Each returns a self-contained SVG with CSS keyframe animation
// Body = head(circle) + torso(line) + arms(lines) + legs(lines)
// All transforms use SVG transform-origin for correct pivot points

function animSVG(id){
// ─────────────────────────────────────────────────────────────────────────
// HUMAN BODY ANIMATION ENGINE
// Each SVG uses filled shapes for a complete human figure:
//   Head = circle, Neck = short rect, Torso = rounded rect with shoulders
//   Limbs = rounded rect segments (upper/lower arm, upper/lower leg)
//   Hands/Feet = small ovals
//   Dumbbells = styled with weight plates
// CSS keyframes animate individual body segments via transform-origin
// Colors: skin=#f4c08a, muscle-highlight=#e8a06a, clothes=#2c3e50/#e8534a
// ─────────────────────────────────────────────────────────────────────────

// Shared style block injected into every SVG
const CSS = `
  .sk{fill:#f4c08a;stroke:#c87840;stroke-width:1;}
  .sh{fill:#e8a06a;}
  .shirt{fill:#2c3e50;}
  .shorts{fill:#c8382d;}
  .shoe{fill:#1a1a2e;stroke:#2c3e50;stroke-width:1;}
  .db-bar{fill:#888;stroke:#555;stroke-width:1;}
  .db-plate{fill:#378add;stroke:#185fa5;stroke-width:1;}
  .db-plate2{fill:#e24b4a;stroke:#a32d2d;stroke-width:1;}
  .lbl{font:11px -apple-system,sans-serif;fill:#6b6860;}
  .muscle{fill:#d4905a;opacity:0.5;}
`;

// ─── HELPER: draw a dumbbell horizontally centered at (cx,cy) ───────────
// returns SVG string: bar + two plate sets
function db(cx,cy,w=38,ph=14){
  const hw=w/2, bh=5;
  return `<rect x="${cx-hw}" y="${cy-bh/2}" width="${w}" height="${bh}" rx="2" class="db-bar"/>
  <rect x="${cx-hw-7}" y="${cy-ph/2}" width="7" height="${ph}" rx="2" class="db-plate"/>
  <rect x="${cx-hw-13}" y="${cy-ph/2+2}" width="6" height="${ph-4}" rx="2" class="db-plate2"/>
  <rect x="${cx+hw}" y="${cy-ph/2}" width="7" height="${ph}" rx="2" class="db-plate"/>
  <rect x="${cx+hw+7}" y="${cy-ph/2+2}" width="6" height="${ph-4}" rx="2" class="db-plate2"/>`;
}

// vertical dumbbell (hammer curl)
function dbV(cx,cy,h=36,pw=14){
  const hh=h/2, bw=5;
  return `<rect x="${cx-bw/2}" y="${cy-hh}" width="${bw}" height="${h}" rx="2" class="db-bar"/>
  <rect x="${cx-pw/2}" y="${cy-hh-7}" width="${pw}" height="7" rx="2" class="db-plate"/>

// ─── STATE ─────────────────────────────────────────────────────────────────
const SK='ironreg_v4';
let S={selectedWeek:1,calWeek:1,completed:{},trainView:null};
// Session runner state
let RS={active:false,week:0,dayIdx:0,exIdx:0,setIdx:0,completedSets:{},resting:false,restRemain:0,paused:false,startTime:0,elapsed:0};
let restTimer=null;

try{const r=localStorage.getItem(SK);if(r){const p=JSON.parse(r);S={...S,...p};}}catch(e){}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function getPhase(w){if(w<=4)return 0;if(w<=8)return 1;if(w<=13)return 2;if(w<=18)return 3;if(w<=22)return 4;return 5;}
function getPlan(pi,dt){const n={A:{name:"Push Day",focus:"Chest · Shoulders · Triceps"},B:{name:"Pull Day",focus:"Back · Biceps · Rear Delts"},C:{name:"Legs & Glutes",focus:"Quads · Hamstrings · Glutes"},D:{name:"Core & Conditioning",focus:"Core · Stability · Grip Strength"}};return{...n[dt],...PP[pi],exercises:EXERCISES[dt]};}
function sk(w,d){return`w${w}d${d}`;}
function isDone(w,d){return!!S.completed[sk(w,d)];}
function doneDate(w,d){return S.completed[sk(w,d)]||'';}
function countDone(){return Object.values(S.completed).filter(Boolean).length;}
function phaseStats(pi){const[s,e]=PHASES[pi].wRange;let done=0,total=0;for(let w=s;w<=e;w++)for(let d=0;d<4;d++){total++;if(isDone(w,d))done++;}return{done,total};}
function wkOpts(sel){return Array.from({length:26},(_,i)=>`<option value="${i+1}"${i+1===sel?' selected':''}>Week ${i+1} — Phase ${getPhase(i+1)+1}: ${PHASES[getPhase(i+1)].name}</option>`).join('');}
function hasInProgress(w,d){const key=`rs_w${w}d${d}`;try{return!!localStorage.getItem(key);}catch(e){return false;}}
function saveRunnerState(){try{localStorage.setItem(`rs_w${RS.week}d${RS.dayIdx}`,JSON.stringify(RS));}catch(e){}}
function clearRunnerState(w,d){try{localStorage.removeItem(`rs_w${w}d${d}`);}catch(e){}}
function loadRunnerState(w,d){try{const r=localStorage.getItem(`rs_w${w}d${d}`);if(r)return JSON.parse(r);}catch(e){}return null;}

// ─── TABS ──────────────────────────────────────────────────────────────────
function switchTab(tab,e){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  if(e&&e.target)e.target.classList.add('active');
  else document.querySelectorAll('.tab').forEach(t=>{if((t.getAttribute('onclick')||'').includes("'"+tab+"'"))t.classList.add('active');});
  ({overview:renderOverview,train:renderTrain,progress:renderProgress,schedule:renderSchedule,benefits:renderBenefits})[tab]();
}

// ─── WEEK DAYS HTML ────────────────────────────────────────────────────────
function weekDaysHTML(w){
  const ph=getPhase(w);
  return DT.map((dt,i)=>{
    const done=isDone(w,i),inprog=!done&&hasInProgress(w,i),p=getPlan(ph,dt),dd=doneDate(w,i);
    const ciCls=done?'ci-done':inprog?'ci-ip':'ci-none';
    const ciTxt=done?'✓':inprog?'…':'';
    const cardCls=done?'done':inprog?'inprogress':'';
    return `<div class="day-card ${cardCls}" onclick="openDay(${w},${i})">
      <div class="day-top">
        <div><div class="day-lbl">${WDAYS[i]}</div><div class="day-name">${p.name}</div><div class="day-focus">${p.focus}</div>${dd?`<div class="date-badge">✓ ${dd}</div>`:''}</div>
        <div class="ci ${ciCls}">${ciTxt}</div>
      </div>
      <div class="day-meta">
        <span class="tag tag-red">${p.sets} sets</span>
        <span class="tag tag-blue">${p.reps} reps</span>
        <span class="tag tag-green">${p.dur}</span>
        <span class="tag tag-amber">Rest ${p.rest}s</span>
      </div>
    </div>`;
  }).join('');
}

// ─── OVERVIEW ──────────────────────────────────────────────────────────────
function renderOverview(){
  const done=countDone(),pct=Math.round(done/96*100);
  let streak=0;for(let w=1;w<=26;w++){if(DT.every((_,i)=>isDone(w,i)))streak++;else break;}
  const curPh=getPhase(S.selectedWeek);
  document.getElementById('hdr-phase').textContent='Phase '+(curPh+1);
  document.getElementById('pane-overview').innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-v" style="color:var(--green)">${done}</div><div class="stat-l">Sessions Done</div></div>
      <div class="stat-card"><div class="stat-v" style="color:var(--blue)">96</div><div class="stat-l">Total Sessions</div></div>
      <div class="stat-card"><div class="stat-v" style="color:var(--amber)">${streak}</div><div class="stat-l">Week Streak</div></div>
      <div class="stat-card"><div class="stat-v" style="color:var(--red)">${pct}%</div><div class="stat-l">Complete</div></div>
    </div>
    <div class="sec">6 Training Phases</div>
    <div class="phase-grid">${PHASES.map((p,i)=>{const{done:pd,total:pt}=phaseStats(i);const pp=Math.round(pd/pt*100);return`<div class="ph-card${i===curPh?' cur':''}" onclick="jumpPhase(${i})"><div class="ph-num">Phase ${i+1}</div><div class="ph-name">${p.name}</div><div class="ph-wks">Wks ${p.weeks}</div><div class="ph-bar"><div class="ph-fill" style="width:${pp}%"></div></div></div>`;}).join('')}</div>
    <div class="divider"></div>
    <div class="sec">Week ${S.selectedWeek} — ${PHASES[curPh].name}</div>
    <div class="week-sel"><select onchange="ovSetWeek(this.value)">${wkOpts(S.selectedWeek)}</select></div>
    <div class="days-grid">${weekDaysHTML(S.selectedWeek)}</div>`;
}
function ovSetWeek(v){S.selectedWeek=parseInt(v);save();renderOverview();}
function jumpPhase(i){S.selectedWeek=PHASES[i].wRange[0];save();renderOverview();}
function openDay(w,d){S.trainView={week:w,dayIdx:d};switchTab('train',null);}

// ─── TRAIN ─────────────────────────────────────────────────────────────────
function renderTrain(){
  const el=document.getElementById('pane-train');
  if(!S.trainView){
    const w=S.selectedWeek,ph=getPhase(w);
    el.innerHTML=`<div class="sec" style="margin-bottom:8px">Select session — Week ${w} (Phase ${ph+1}: ${PHASES[ph].name})</div>
    <div class="week-sel"><select onchange="trainSetWeek(this.value)">${wkOpts(w)}</select></div>
    <div class="days-grid">${weekDaysHTML(w)}</div>`;
    return;
  }
  const{week:w,dayIdx:di}=S.trainView;
  const ph=getPhase(w),dt=DT[di],p=getPlan(ph,dt),exList=p.exercises;
  const sessionDone=isDone(w,di),dd=doneDate(w,di);
  const inprog=hasInProgress(w,di);

  let html=`<button class="back-btn" onclick="backTrain()">&#8592; Week ${w}</button>
  <div style="font-size:19px;font-weight:700;color:var(--text);margin-bottom:4px">${p.name}</div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:.75rem">Week ${w} · Phase ${ph+1}: ${PHASES[ph].name} · ${WDAYS[di]}${sessionDone&&dd?` · Completed ${dd}`:''}</div>
  <div class="meta-row">
    <div class="mpill">Duration <span>${p.dur}</span></div>
    <div class="mpill">Sets <span>${p.sets}</span></div>
    <div class="mpill">Reps <span>${p.reps}</span></div>
    <div class="mpill">Rest <span>${p.rest}s</span></div>
    <div class="mpill">Level <span>${p.level}</span></div>
  </div>
  <div class="start-card">
    <h3>${sessionDone ? '✓ Session Complete' : inprog ? '▶ Session In Progress' : '▶ Ready to Train'}</h3>
    <p>${sessionDone ? `Great work! This session was completed on ${dd}.` : inprog ? 'You have a saved session in progress. Resume where you left off or start fresh.' : `${exList.length} exercises · ${p.sets} sets each · Rest ${p.rest}s between sets`}</p>
    <div class="ex-list-preview">${exList.map((ex,ei)=>`<div class="ex-prev-row"><div class="ex-prev-num">${ei+1}</div><div><div class="ex-prev-name">${ex.name}</div><div class="ex-prev-muscle">${ex.muscle}</div></div></div>`).join('')}</div>
    ${inprog&&!sessionDone?`<button class="btn-continue" onclick="resumeSession(${w},${di})">Resume Session ↗</button>`:''}
    <button class="btn-start-session" onclick="startSession(${w},${di})">${sessionDone?'Redo Session':inprog?'Start Fresh':'Start Session ↗'}</button>
  </div>`;
  el.innerHTML=html;
}
function backTrain(){S.trainView=null;renderTrain();}
function trainSetWeek(v){S.selectedWeek=parseInt(v);S.trainView=null;save();renderTrain();}

// ─── SESSION RUNNER ────────────────────────────────────────────────────────
function startSession(w,di){
  clearRunnerState(w,di);
  RS={active:true,week:w,dayIdx:di,exIdx:0,setIdx:0,completedSets:{},resting:false,restRemain:0,paused:false,startTime:Date.now(),elapsed:0};
  showRunner();
}
function resumeSession(w,di){
  const saved=loadRunnerState(w,di);
  if(saved){RS={...saved,paused:false,startTime:Date.now()-saved.elapsed*1000};}
  else{startSession(w,di);return;}
  showRunner();
}
function showRunner(){
  const r=document.getElementById('runner');
  r.style.display='flex';
  renderRunner();
}
function closeRunner(){
  if(restTimer){clearInterval(restTimer);restTimer=null;}
  document.getElementById('runner').style.display='none';
  renderTrain();
  renderOverview();
}

function renderRunner(){
  const r=document.getElementById('runner');
  const{week:w,dayIdx:di,exIdx:ei,setIdx:si,completedSets:cs,resting,paused}=RS;
  const ph=getPhase(w),p=getPlan(ph,DT[di]),exList=p.exercises;
  const totalEx=exList.length,totalSets=p.sets;
  const ex=exList[ei];

  // overall progress
  let totalDone=0;
  exList.forEach((_,i)=>{for(let s=0;s<totalSets;s++){if(cs[`${i}-${s}`])totalDone++;}});
  const grandTotal=totalEx*totalSets;
  const progPct=Math.round(totalDone/grandTotal*100);

  // sets done for current exercise
  const exSetsDone=Array.from({length:totalSets},(_,s)=>!!cs[`${ei}-${s}`]).filter(Boolean).length;

  let html=`
  <div style="background:var(--steel);color:#e8e0d4;padding:.85rem 1.1rem;display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <button class="runner-back" onclick="pauseAndClose()">✕</button>
    <div style="flex:1"><div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px">${p.name}</div>
    <div style="font-size:11px;color:#9fb3c8;margin-top:1px">Week ${w} · ${WDAYS[di]} · Exercise ${ei+1}/${totalEx}</div></div>
    <button onclick="togglePause()" style="background:none;border:1px solid rgba(255,255,255,.3);color:#e8e0d4;border-radius:var(--r);padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;">${paused?'Resume':'Pause'}</button>
  </div>
  <div style="height:4px;background:rgba(255,255,255,.1);flex-shrink:0;"><div style="height:100%;background:var(--teal);width:${progPct}%;transition:width .4s;"></div></div>
  <div style="flex:1;overflow-y:auto;padding:1rem 1.1rem;position:relative;">
    ${paused?`<div class="paused-overlay"><h2>⏸ Paused</h2><p>Session saved. Close safely.</p><button class="btn-resume" onclick="togglePause()">Resume Training</button><button class="btn-quit" onclick="quitRunner()">Save &amp; Exit</button></div>`:''}
    
    <div class="ex-anim-wrap">${animSVG(ex.id)}</div>
    
    <div class="ex-headline">${ex.name}</div>
    <div class="ex-muscles">${ex.muscle}</div>
    <div class="ex-tags-row">
      <span class="tag ${ex.type}">${ex.muscle.split('·')[0].trim()}</span>
      <span class="tag tag-blue">${totalSets} sets × ${p.reps} reps</span>
      <span class="tag tag-amber">Rest ${p.rest}s</span>
    </div>

    ${resting?`
    <div class="rest-timer">
      <h3>🛑 Rest Period</h3>
      <div class="rest-countdown" id="rest-count">${RS.restRemain}</div>
      <div class="rest-sub">seconds remaining</div>
      <button class="rest-skip" onclick="skipRest()">Skip Rest ↗</button>
    </div>`:`
    <div class="sets-track">
      <div class="sets-track-hdr"><span class="sets-track-label">Sets Completed</span><span class="sets-track-count">${exSetsDone}/${totalSets}</span></div>
      <div class="sets-dots">${Array.from({length:totalSets},(_,s)=>`<div class="set-dot${cs[`${ei}-${s}`]?' done':s===si?' active':''}" onclick="toggleSet(${ei},${s})">${s+1}</div>`).join('')}</div>
    </div>`}

    <div class="form-box">
      <h4>📋 Form Cue</h4>
      <p>${ex.form}</p>
    </div>
    <div class="benefit-box">
      <h4>⚡ Why This Exercise</h4>
      <p>${ex.benefit}</p>
    </div>
  </div>
  <div style="display:flex;gap:8px;padding:.85rem 1.1rem;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;">
    ${ei>0?`<button class="btn btn-prev" onclick="goEx(${ei-1})">&#8592; Prev</button>`:'<div style="flex:0.5"></div>'}
    ${ei<totalEx-1?
      `<button class="btn btn-next" onclick="advanceEx()">Next Ex &#8594;</button>`:
      `<button class="btn btn-finish" onclick="finishSession()">&#10003; Finish Session</button>`
    }
  </div>`;
  r.innerHTML=html;
  if(resting&&!RS.paused)startRestCountdown();
}

function toggleSet(ei,si){
  const key=`${ei}-${si}`;
  RS.completedSets[key]=!RS.completedSets[key];
  // if all sets for this exercise done, auto-start rest
  const p=getPlan(getPhase(RS.week),DT[RS.dayIdx]);
  const allDone=Array.from({length:p.sets},(_,s)=>!!RS.completedSets[`${ei}-${s}`]).every(Boolean);
  if(allDone&&!RS.resting){
    RS.resting=true;RS.restRemain=p.rest;
    saveRunnerState();renderRunner();return;
  }
  // find next active set
  for(let s=0;s<p.sets;s++){if(!RS.completedSets[`${ei}-${s}`]){RS.setIdx=s;break;}}
  saveRunnerState();renderRunner();
}

function startRestCountdown(){
  if(restTimer)clearInterval(restTimer);
  restTimer=setInterval(()=>{
    if(RS.paused)return;
    RS.restRemain--;
    const el=document.getElementById('rest-count');
    if(el)el.textContent=RS.restRemain;
    if(RS.restRemain<=0){
      clearInterval(restTimer);restTimer=null;
      RS.resting=false;
      // move to next ex if all sets done
      const p=getPlan(getPhase(RS.week),DT[RS.dayIdx]);
      const exList=p.exercises;
      if(RS.exIdx<exList.length-1)RS.exIdx++;
      RS.setIdx=0;
      saveRunnerState();renderRunner();
    }
  },1000);
}

function skipRest(){
  if(restTimer){clearInterval(restTimer);restTimer=null;}
  RS.resting=false;
  const p=getPlan(getPhase(RS.week),DT[RS.dayIdx]);
  const exList=p.exercises;
  if(RS.exIdx<exList.length-1)RS.exIdx++;
  RS.setIdx=0;
  saveRunnerState();renderRunner();
}

function advanceEx(){
  RS.exIdx++;RS.setIdx=0;RS.resting=false;
  if(restTimer){clearInterval(restTimer);restTimer=null;}
  saveRunnerState();renderRunner();
}

function goEx(idx){
  RS.exIdx=idx;RS.setIdx=0;RS.resting=false;
  if(restTimer){clearInterval(restTimer);restTimer=null;}
  saveRunnerState();renderRunner();
}

function togglePause(){
  RS.paused=!RS.paused;
  if(!RS.paused&&RS.resting){
    // resume rest countdown
    renderRunner();
  } else {
    saveRunnerState();renderRunner();
  }
}

function pauseAndClose(){
  RS.paused=true;saveRunnerState();renderRunner();
}

function quitRunner(){
  if(restTimer){clearInterval(restTimer);restTimer=null;}
  saveRunnerState();
  document.getElementById('runner').style.display='none';
  renderTrain();
}

function finishSession(){
  if(restTimer){clearInterval(restTimer);restTimer=null;}
  const now=new Date();const ds=now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  S.completed[sk(RS.week,RS.dayIdx)]=ds;
  clearRunnerState(RS.week,RS.dayIdx);
  save();
  showCompletionScreen(RS.week,RS.dayIdx,ds);
}

function showCompletionScreen(w,di,ds){
  const ph=getPhase(w),p=getPlan(ph,DT[di]);
  const exList=p.exercises,totalSets=p.sets;
  let setsCompleted=0;
  exList.forEach((_,i)=>{for(let s=0;s<totalSets;s++){if(RS.completedSets[`${i}-${s}`])setsCompleted++;}});
  const elapsed=Math.round((Date.now()-RS.startTime)/60000);
  const r=document.getElementById('runner');
  r.innerHTML=`
  <div style="background:var(--steel);color:#e8e0d4;padding:.85rem 1.1rem;display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <div style="flex:1"><div style="font-size:14px;font-weight:700;text-transform:uppercase;">Session Complete!</div></div>
  </div>
  <div class="complete-screen">
    <div class="complete-icon">🏆</div>
    <h2>Outstanding!</h2>
    <p>${p.name} · Week ${w} · ${WDAYS[di]}<br/><span style="font-size:13px;color:var(--text3)">Completed ${ds}</span></p>
    <div class="complete-stats">
      <div class="cs-card"><div class="cs-v" style="color:var(--green)">${exList.length}</div><div class="cs-l">Exercises</div></div>
      <div class="cs-card"><div class="cs-v" style="color:var(--blue)">${setsCompleted}</div><div class="cs-l">Sets Done</div></div>
      <div class="cs-card"><div class="cs-v" style="color:var(--amber)">${elapsed||p.dur.split(' ')[0]}</div><div class="cs-l">Minutes</div></div>
    </div>
    <button class="btn-start-session" onclick="closeRunner()">Back to Program ↗</button>
  </div>`;
}

// ─── PROGRESS ──────────────────────────────────────────────────────────────
function renderProgress(){
  const done=countDone(),pct=Math.round(done/96*100),w=S.selectedWeek;
  let wdone=0;for(let d=0;d<4;d++)if(isDone(w,d))wdone++;
  const entries=Object.entries(S.completed).filter(([,v])=>v);
  document.getElementById('pane-progress').innerHTML=`
  <div class="big-prog">
    <div class="bp-top"><div class="bp-lbl">Overall — ${done}/96 sessions</div><div class="bp-val">${pct}%</div></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  </div>
  <div class="sec">Phase Breakdown</div>
  ${PHASES.map((p,i)=>{const{done:pd,total:pt}=phaseStats(i);const pp=Math.round(pd/pt*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:600;color:var(--text)">Phase ${i+1}: ${p.name} (Wks ${p.weeks})</span><span style="font-size:12px;color:var(--text2)">${pd}/${pt} · ${pp}%</span></div><div class="pbar" style="height:5px"><div class="pfill pfill-g" style="width:${pp}%"></div></div></div>`;}).join('')}
  <div class="divider"></div>
  <div class="sec">Week ${w} Stats</div>
  <div class="wk-grid">
    <div class="wk-cell"><div class="wk-v" style="color:var(--green)">${wdone}</div><div class="wk-l">Done</div></div>
    <div class="wk-cell"><div class="wk-v" style="color:var(--red)">${4-wdone}</div><div class="wk-l">Remaining</div></div>
    <div class="wk-cell"><div class="wk-v" style="color:var(--blue)">4</div><div class="wk-l">Planned</div></div>
    <div class="wk-cell"><div class="wk-v" style="color:var(--amber)">${Math.round(wdone/4*100)}%</div><div class="wk-l">Rate</div></div>
  </div>
  <div class="divider"></div>
  <div class="sec">Completed Sessions Log</div>
  ${!entries.length?`<div class="empty">No completed sessions yet. Start training!</div>`:
    entries.slice().reverse().map(([key,date])=>{const m=key.match(/w(\d+)d(\d+)/);if(!m)return'';const wk=parseInt(m[1]),di=parseInt(m[2]),pp=getPlan(getPhase(wk),DT[di]);return`<div class="log-entry"><div class="log-dot"></div><div style="flex:1"><div class="log-name">${pp.name}</div><div class="log-sub">Week ${wk} · ${WDAYS[di]}</div></div><div class="log-date">${date}</div></div>`;}).join('')}
  <div class="divider"></div>
  <div class="sec">Activity Calendar — Week ${S.calWeek}</div>
  <div class="week-sel"><select onchange="calSetWeek(this.value)">${wkOpts(S.calWeek)}</select></div>
  <div class="cal-hdr"><div class="cal-lbl">Mon</div><div class="cal-lbl">Tue</div><div class="cal-lbl">Wed</div><div class="cal-lbl">Thu</div><div class="cal-lbl">Fri</div><div class="cal-lbl">Sat</div><div class="cal-lbl">Sun</div></div>
  <div class="cal-grid">${[0,1,null,2,3,null,null].map((di)=>di===null?`<div class="cal-cell cal-rest">R</div>`:`<div class="cal-cell ${isDone(S.calWeek,di)?'cal-done':'cal-workout'}" onclick="openDay(${S.calWeek},${di})">${isDone(S.calWeek,di)?'✓':DT[di]}</div>`).join('')}</div>`;
}
function calSetWeek(v){S.calWeek=parseInt(v);save();renderProgress();}

// ─── SCHEDULE ──────────────────────────────────────────────────────────────
function renderSchedule(){
  let html='';
  PHASES.forEach((ph,pi)=>{
    const[s,e]=ph.wRange;
    html+=`<div style="margin-bottom:1.25rem"><div class="sec">Phase ${pi+1}: ${ph.name} — Weeks ${ph.weeks}</div><div style="font-size:12px;color:var(--text2);margin-bottom:8px">${ph.focus}</div>`;
    for(let w=s;w<=e;w++){
      const p=PP[pi],done=DT.filter((_,i)=>isDone(w,i)).length;
      const col=done===4?'var(--green)':done>0?'var(--amber)':'var(--text3)';
      html+=`<div class="sched-row" onclick="jumpTrain(${w})"><div class="sched-wk">Week ${w}</div><div class="sched-info">${p.sets} sets · ${p.reps} reps · Rest ${p.rest}s · ${p.level}</div><div style="font-size:11px;color:${col}">${done}/4</div><div class="sched-bar"><div class="sched-fill" style="width:${done/4*100}%;background:${col}"></div></div></div>`;
    }
    html+='</div>';
  });
  document.getElementById('pane-schedule').innerHTML=html;
}
function jumpTrain(w){S.selectedWeek=w;S.trainView=null;save();switchTab('train',null);}

// ─── BENEFITS ──────────────────────────────────────────────────────────────
function renderBenefits(){
  document.getElementById('pane-benefits').innerHTML=`
  <div class="sec">Why This Program Works</div>
  <div style="display:flex;flex-direction:column;gap:10px">
  ${BENEFITS.map(b=>`<div class="benefit-card"><div class="benefit-icon">${b.icon}</div><h3>${b.title}</h3><p>${b.text}</p></div>`).join('')}
  </div>
  <div class="divider"></div>
  <div class="sec">Dumbbell Exercise Benefits</div>
  ${['A','B','C','D'].map(dt=>{
    const names={A:'Push Day Exercises',B:'Pull Day Exercises',C:'Leg Day Exercises',D:'Core Day Exercises'};
    return`<div style="margin-bottom:1rem"><div class="sec" style="margin-bottom:6px">${names[dt]}</div>${EXERCISES[dt].map(ex=>`<div class="benefit-card" style="margin-bottom:6px"><h3 style="font-size:13px">${ex.name}</h3><p style="font-size:12px">${ex.benefit}</p></div>`).join('')}</div>`;
  }).join('')}`;
}

// ─── INIT ───────────────────────────────────────────────────────────────────
renderOverview();
</script>
</body>
</html>
